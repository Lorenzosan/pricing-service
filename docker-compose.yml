services:
  pricer:
    build: .
    container_name: pricing-service
    ports:
      - "8000:8000"

  prometheus:
    image: prom/prometheus:latest
    container_name: pricing-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    depends_on:
      - pricer